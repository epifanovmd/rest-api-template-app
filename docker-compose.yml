services:
  backend:
    build: .
    container_name: backend
    env_file: .env.production
    ports:
      - "8181:8181"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8181/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
