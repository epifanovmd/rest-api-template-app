services:
  backend:
    build: .
    container_name: backend
    env_file: .env.production
    ports:
      - "8181:8181"
      - "51820:51820/udp"
    restart: unless-stopped
    # WireGuard needs NET_ADMIN + SYS_MODULE to manage kernel interfaces
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./wg-config:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
