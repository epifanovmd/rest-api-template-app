services:
  backend:
    build: .
    container_name: backend
    env_file: .env.production
    ports:
      - "8181:8181"
      - "3232:3232"
    restart: unless-stopped
    volumes:
      - ./files:/app/files
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
